<!DOCTYPE html>
<html>
<head>
    <title>Trimble Connect MiniMap - Sanntid + WMS/WFS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const mapDiv = document.getElementById('map');
            if(mapDiv) {
                mapDiv.innerHTML = `<div style="padding:20px; color:#d8000c; background-color:#ffbaba; font-family:sans-serif; border:1px solid #d8000c; margin:10px;">
                <b>Feil:</b><br>${msg}</div>`;
            }
            return false;
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: #fff;}
        #map { flex-grow: 1; width: 100%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; color: #666; }
        #ui-panel { padding: 10px; background: #f8f9fa; border-top: 1px solid #ccc; font-size: 14px; overflow-y: auto; flex-shrink: 0; }
        .control-group { margin-bottom: 10px; }
        .input-group { margin-top: 5px; display: flex; gap: 5px; flex-wrap: wrap; }
        select, button, input[type="text"] { padding: 4px; }
        input[type="text"] { flex-grow: 1; min-width: 120px; }
        label { cursor: pointer; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background-color: red; margin-right: 5px; }
        .status-dot.connected { background-color: #4CAF50; }
    </style>
</head>
<body>

    <div id="map">Laster kartbiblioteker...</div>

    <div id="ui-panel">
        <div class="control-group">
            <span id="api-status" class="status-dot"></span>
            <strong id="api-text">Venter på Trimble Connect API...</strong>
        </div>

        <div class="control-group">
            <strong>1. Prosjektets koordinatsystem:</strong><br>
            <select id="crs-selector" onchange="updateCRS()" style="margin-top: 5px; width: 100%;"></select>
        </div>
        
        <div class="control-group">
            <label><input type="checkbox" id="swap-xy" onchange="forceSync()"> <strong>Bytt om X og Y</strong></label>
            <label style="margin-left: 10px;"><input type="checkbox" id="use-target" onchange="forceSync()" checked> <strong>Bruk siktlinje (senter)</strong></label>
        </div>

        <div class="control-group" style="border-top: 1px solid #ddd; padding-top: 10px;">
            <strong>2. Legg til WMS (Bilde):</strong>
            <div class="input-group">
                <input type="text" id="wms-url" placeholder="URL...">
                <input type="text" id="wms-layer" placeholder="Lagnavn">
                <button onclick="addCustomWMS()">Legg til</button>
            </div>
        </div>

        <div class="control-group" style="border-top: 1px solid #ddd; padding-top: 10px;">
            <strong>3. Legg til WFS (Vektordata):</strong>
            <div class="input-group">
                <input type="text" id="wfs-url" placeholder="URL...">
                <input type="text" id="wfs-layer" placeholder="Typenavn (feature)">
                <button onclick="addCustomWFS()">Legg til</button>
            </div>
            <div id="wfs-status" style="font-size: 11px; color: #666; margin-top: 3px;"></div>
        </div>

        <div class="control-group" style="border-top: 1px solid #ddd; padding-top: 10px; background: #eef; padding: 5px;">
            <div id="coord-readout" style="color: #555; font-size: 12px;">Naviger i 3D for å se koordinater...</div>
        </div>
    </div>

    <script>
        document.getElementById('map').innerHTML = '';

        // --- GLOBALE VARIABLER OG KOORDINATSYSTEMER ---
        let currentModelCRS = "EPSG:25832"; 
        let lastModelX = null, lastModelY = null;
        let map, cameraMarker, layerControl;

        const crsConfig = {
            "EPSG:25832": { name: "EUREF89 UTM Sone 32N", projString: "+proj=utm +zone=32 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs" },
            "EPSG:25833": { name: "EUREF89 UTM Sone 33N", projString: "+proj=utm +zone=33 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs" }
        };

        for (let zone = 5; zone <= 30; zone++) {
            crsConfig[`EPSG:${5100 + zone}`] = {
                name: `EUREF89 NTM Sone ${zone}`,
                projString: `+proj=tmerc +lat_0=58 +lon_0=${zone + 0.5} +k=1 +x_0=100000 +y_0=1000000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs`
            };
        }
        for (const [code, data] of Object.entries(crsConfig)) proj4.defs(code, data.projString);

        // --- KARTOPPSETT ---
        map = L.map('map').setView([60.8, 11.1], 5); 
        var flyfotoLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
        var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
        
        flyfotoLayer.addTo(map);
        layerControl = L.control.layers({"Flyfoto": flyfotoLayer, "Vektorkart": osmLayer}, {}).addTo(map);
        cameraMarker = L.marker([0,0]).addTo(map);

        // --- UI LOGIKK ---
        const selector = document.getElementById('crs-selector');
        for (const [code, data] of Object.entries(crsConfig)) {
            selector.appendChild(new Option(`${data.name} (${code})`, code));
        }

        function updateCRS() {
            currentModelCRS = document.getElementById('crs-selector').value;
            forceSync();
        }

        function forceSync() {
            if (lastModelX !== null && lastModelY !== null) syncMapToTrimbleCamera(lastModelX, lastModelY);
        }

        function addCustomWMS() {
            var url = document.getElementById('wms-url').value;
            var layerName = document.getElementById('wms-layer').value;
            if (!url || !layerName) return alert("Fyll inn WMS URL og lagnavn.");
            
            var newLayer = L.tileLayer.wms(url, { layers: layerName, format: 'image/png', transparent: true });
            newLayer.addTo(map);
            layerControl.addOverlay(newLayer, layerName + " (WMS)");
        }

        // --- NY WFS LOGIKK ---
        async function addCustomWFS() {
            const baseUrl = document.getElementById('wfs-url').value;
            const typeName = document.getElementById('wfs-layer').value;
            const statusDiv = document.getElementById('wfs-status');
            
            if (!baseUrl || !typeName) return alert("Fyll inn WFS URL og typenavn.");

            statusDiv.innerText = "Laster ned vektordata...";
            statusDiv.style.color = "blue";

            // Bygger en WFS-spørring som ber om data i GeoJSON-format satt til WGS84 (EPSG:4326)
            // Merk at ? eller & avhenger av om URLen allerede har parametere
            const separator = baseUrl.includes('?') ? '&' : '?';
            const wfsRequestUrl = `${baseUrl}${separator}service=WFS&version=1.0.0&request=GetFeature&typeName=${typeName}&outputFormat=application/json&srsName=EPSG:4326`;

            try {
                const response = await fetch(wfsRequestUrl);
                if (!response.ok) throw new Error(`Server svarte med status ${response.status}`);
                
                const geoJsonData = await response.json();

                // Legger til dataen i kartet med en funksjon som lager popups
                const wfsLayer = L.geoJSON(geoJsonData, {
                    style: function (feature) {
                        return { color: "#ff7800", weight: 2, opacity: 0.8 }; // Standard stil for WFS-geometri
                    },
                    onEachFeature: function (feature, layer) {
                        // Bygger et dynamisk sprettoppvindu basert på alle egenskapene (properties) til objektet
                        if (feature.properties) {
                            let popupContent = "<div style='max-height: 200px; overflow-y: auto;'><b>Egenskaper:</b><br>";
                            for (let key in feature.properties) {
                                popupContent += `<b>${key}:</b> ${feature.properties[key]}<br>`;
                            }
                            popupContent += "</div>";
                            layer.bindPopup(popupContent);
                        }
                    }
                });

                wfsLayer.addTo(map);
                layerControl.addOverlay(wfsLayer, typeName + " (WFS)");
                
                statusDiv.innerText = `Lastet inn ${geoJsonData.features.length} objekter.`;
                statusDiv.style.color = "green";

            } catch (error) {
                console.error("WFS feil:", error);
                statusDiv.innerText = "Feil: Klarte ikke hente data. Sjekk URL, typenavn eller CORS-blokkering.";
                statusDiv.style.color = "red";
            }
        }

        // --- SYNKRONISERING ---
        function syncMapToTrimbleCamera(modelX, modelY) {
            lastModelX = modelX;
            lastModelY = modelY;

            const swapXY = document.getElementById('swap-xy').checked;
            let projEasting = swapXY ? modelY : modelX;
            let projNorthing = swapXY ? modelX : modelY;

            try {
                const wgs84Coords = proj4(currentModelCRS, 'EPSG:4326', [projEasting, projNorthing]);
                map.setView([wgs84Coords[1], wgs84Coords[0]], map.getZoom()); 
                cameraMarker.setLatLng([wgs84Coords[1], wgs84Coords[0]]);
                
                document.getElementById('coord-readout').innerHTML = 
                    `<b>Fra 3D (meter):</b> X=${modelX.toFixed(1)}, Y=${modelY.toFixed(1)}`;
            } catch (error) {
                console.error("Proj4 konverteringsfeil:", error);
            }
        }

        // --- TRIMBLE CONNECT INTEGRASJON ---
        async function initTrimbleConnect() {
            if (typeof TrimbleConnectWorkspace === 'undefined') {
                document.getElementById('api-text').innerText = "Kjører utenfor Trimble Connect.";
                return;
            }

            try {
                const workspaceAPI = await TrimbleConnectWorkspace.connect(window.parent, (event, data) => {
                    if (event === "viewer.onCameraChanged") {
                        const useTarget = document.getElementById('use-target').checked;
                        const cameraPoint = (useTarget && data.target) ? data.target : data.position;

                        if (cameraPoint && cameraPoint.x !== undefined) {
                            const x_meter = cameraPoint.x / 1000;
                            const y_meter = cameraPoint.y / 1000;
                            syncMapToTrimbleCamera(x_meter, y_meter);
                        }
                    }
                });
                
                document.getElementById('api-status').classList.add('connected');
                document.getElementById('api-text').innerText = "Koblet til 3D-visningen!";

            } catch (error) {
                console.error("Klarte ikke koble til Workspace API:", error);
                document.getElementById('api-text').innerText = "Feil ved tilkobling til 3D-motor.";
            }
        }

        initTrimbleConnect();

    </script>
</body>
</html>
