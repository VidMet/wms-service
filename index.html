<!DOCTYPE html>
<html>
<head>
    <title>Trimble Connect MiniMap - Flyfoto og NTM</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        #map { flex-grow: 1; width: 100%; }
        #ui-panel { padding: 10px; background: #f8f9fa; border-top: 1px solid #ccc; font-size: 14px; }
        .control-group { margin-bottom: 10px; }
        .input-group { margin-top: 5px; }
        select, button, input { padding: 4px; }
        input[type="text"] { width: 200px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-panel">
        <div class="control-group">
            <strong>Modellens koordinatsystem:</strong>
            <select id="crs-selector" onchange="updateCRS()">
                </select>
        </div>
        
        <div class="control-group">
            <strong>Legg til egne WMS-lag (f.eks. lokale ortofoto):</strong>
            <div class="input-group">
                <input type="text" id="wms-url" placeholder="Lim inn WMS URL...">
                <input text="text" id="wms-layer" placeholder="Lagnavn">
                <button onclick="addCustomWMS()">Legg til</button>
            </div>
        </div>

        <div class="control-group" style="border-top: 1px solid #ddd; padding-top: 5px;">
            <button onclick="simulateTrimbleCameraMoved()">Test: Simuler kamera i 3D</button>
            <span id="coord-readout" style="margin-left: 10px; color: #555;">Venter på 3D-kamera...</span>
        </div>
    </div>

    <script>
        // 1. Introduser globale variabler for å huske siste kameraposisjon
        let lastModelX = null;
        let lastModelY = null;

        // 2. Oppdater synkroniseringsfunksjonen slik at den lagrer posisjonen hver gang kameraet flytter seg
        function syncMapToTrimbleCamera(modelX, modelY) {
            // Lagre koordinatene slik at vi husker dem til et eventuelt systembytte senere
            lastModelX = modelX;
            lastModelY = modelY;

            // Konverter fra valgt prosjekt-CRS til WGS84
            const wgs84Coords = proj4(currentModelCRS, 'EPSG:4326', [modelX, modelY]);
            const lng = wgs84Coords[0];
            const lat = wgs84Coords[1];

            // Flytt kartet og oppdater markøren glatt
            map.flyTo([lat, lng], 17, { animate: true, duration: 0.5 });
            cameraMarker.setLatLng([lat, lng]);

            document.getElementById('coord-readout').innerText = 
                `Modell: X=${modelX.toFixed(1)}, Y=${modelY.toFixed(1)} | Kart: Lat=${lat.toFixed(5)}, Lng=${lng.toFixed(5)}`;
        }

        // 3. Oppdater funksjonen som kjører ved endring i nedtrekksmenyen
        function updateCRS() {
            currentModelCRS = document.getElementById('crs-selector').value;
            console.log("Byttet aktivt koordinatsystem til:", currentModelCRS);
            
            // Sjekk om vi allerede har mottatt koordinater fra 3D-visningen.
            // Hvis vi har det, kjører vi synkroniseringen på nytt med det samme slik at kartet flytter seg.
            if (lastModelX !== null && lastModelY !== null) {
                console.log("Rekalkulerer posisjon med nytt koordinatsystem...");
                syncMapToTrimbleCamera(lastModelX, lastModelY);
            }
        }

        // --- 4. FUNKSJON FOR BRUKERDEFINERTE WMS-LAG ---
        function addCustomWMS() {
            var url = document.getElementById('wms-url').value;
            var layerName = document.getElementById('wms-layer').value;
            var displayName = layerName || "Egendefinert lag";

            if (!url || !layerName) {
                alert("Du må fylle inn både WMS URL og lagnavn.");
                return;
            }

            var newWmsLayer = L.tileLayer.wms(url, {
                layers: layerName,
                format: 'image/png',
                transparent: true,
                version: '1.3.0'
            });

            newWmsLayer.addTo(map);
            layerControl.addOverlay(newWmsLayer, displayName);

            // Tøm feltene etterpå
            document.getElementById('wms-url').value = '';
            document.getElementById('wms-layer').value = '';
        }

        // --- 5. TIE-IN TIL TRIMBLE CONNECT API ---
        var cameraMarker = L.marker([0,0]).addTo(map);

        function syncMapToTrimbleCamera(modelX, modelY) {
            // Konverter fra valgt prosjekt-CRS (f.eks. en NTM-sone) til WGS84
            const wgs84Coords = proj4(currentModelCRS, 'EPSG:4326', [modelY, modelX]);
            const lng = wgs84Coords[0];
            const lat = wgs84Coords[1];

            // Flytt kartet og oppdater markøren glatt
            map.flyTo([lat, lng], 17, { animate: true, duration: 0.5 });
            cameraMarker.setLatLng([lat, lng]);

            document.getElementById('coord-readout').innerText = 
                `Modell: X=${modelX.toFixed(1)}, Y=${modelY.toFixed(1)} | Kart: Lat=${lat.toFixed(5)}, Lng=${lng.toFixed(5)}`;
        }

        // Simuleringsknapp for testing utenfor selve Trimble Connect-rammeverket
        function simulateTrimbleCameraMoved() {
            // Eksempelkoordinater (Kan representere en anleggsmodell i NTM Sone 10 eller UTM 32)
            // Hvis du har valgt NTM-sone 10, vil disse treffe i nærheten av Hamar/Løten
            const mockX = 132400.0; 
            const mockY = 1311500.0;
            syncMapToTrimbleCamera(mockX, mockY);
        }
    </script>
</body>
</html>
