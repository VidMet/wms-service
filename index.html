<!DOCTYPE html>
<html>
<head>
    <title>Trimble Connect MiniMap - NTM & Flyfoto</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        #map { flex-grow: 1; width: 100%; }
        #ui-panel { padding: 10px; background: #f8f9fa; border-top: 1px solid #ccc; font-size: 14px; overflow-y: auto; }
        .control-group { margin-bottom: 10px; }
        .input-group { margin-top: 5px; }
        select, button, input[type="text"] { padding: 4px; }
        input[type="text"] { width: 180px; }
        label { cursor: pointer; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-panel">
        <div class="control-group">
            <strong>1. Prosjektets koordinatsystem:</strong><br>
            <select id="crs-selector" onchange="updateCRS()" style="margin-top: 5px; width: 100%; max-width: 300px;">
                </select>
        </div>
        
        <div class="control-group">
            <label>
                <input type="checkbox" id="swap-xy" onchange="forceSync()"> 
                <strong>Bytt om X og Y</strong> (Bruk denne hvis kartet havner i feil land/akse)
            </label>
        </div>

        <div class="control-group" style="border-top: 1px solid #ddd; padding-top: 10px;">
            <strong>2. Legg til ekstra WMS-lag:</strong>
            <div class="input-group">
                <input type="text" id="wms-url" placeholder="Lim inn WMS URL...">
                <input type="text" id="wms-layer" placeholder="Lagnavn">
                <button onclick="addCustomWMS()">Legg til</button>
            </div>
        </div>

        <div class="control-group" style="border-top: 1px solid #ddd; padding-top: 10px; background: #eef;">
            <button onclick="simulateTrimbleCameraMoved()">Test: Simuler Fredrikstad (NTM11)</button>
            <div id="coord-readout" style="margin-top: 5px; color: #555; font-size: 12px;">Venter på 3D-kamera...</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. GLOBALE VARIABLER FOR TILSTAND
        // ==========================================
        let currentModelCRS = "EPSG:25832"; // Standard er UTM32
        let lastModelX = null;
        let lastModelY = null;

        // ==========================================
        // 2. KOORDINATSYSTEMER (UTM & NTM)
        // ==========================================
        const crsConfig = {
            "EPSG:25832": {
                name: "EUREF89 UTM Sone 32N",
                projString: "+proj=utm +zone=32 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs"
            },
            "EPSG:25833": {
                name: "EUREF89 UTM Sone 33N",
                projString: "+proj=utm +zone=33 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs"
            }
        };

        // Generer NTM Sone 5 til 30
        for (let zone = 5; zone <= 30; zone++) {
            let epsgCode = `EPSG:${5100 + zone}`;
            let lon0 = zone + 0.5;
            crsConfig[epsgCode] = {
                name: `EUREF89 NTM Sone ${zone}`,
                projString: `+proj=tmerc +lat_0=58 +lon_0=${lon0} +k=1 +x_0=100000 +y_0=1000000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs`
            };
        }

        // Registrer i Proj4
        for (const [code, data] of Object.entries(crsConfig)) {
            proj4.defs(code, data.projString);
        }

        // ==========================================
        // 3. KARTOPPSETT
        // ==========================================
        // Starter i Norge, zoomet ut
        var map = L.map('map').setView([60.8, 11.1], 5); 

        // Esri Flyfoto
        var flyfotoLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri'
        });

        // OpenStreetMap
        var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap'
        });

        flyfotoLayer.addTo(map);

        var baseMaps = {
            "Flyfoto / Satellitt": flyfotoLayer,
            "OpenStreetMap (Vektor)": osmLayer
        };
        var overlayMaps = {};
        var layerControl = L.control.layers(baseMaps, overlayMaps).addTo(map);

        // ==========================================
        // 4. UI OG LOGIKK
        // ==========================================
        
        // Fyll nedtrekksmenyen
        const selector = document.getElementById('crs-selector');
        for (const [code, data] of Object.entries(crsConfig)) {
            let option = document.createElement('option');
            option.value = code;
            option.text = `${data.name} (${code})`;
            selector.appendChild(option);
        }

        function updateCRS() {
            currentModelCRS = document.getElementById('crs-selector').value;
            forceSync();
        }

        // Tvinger en ny utregning hvis man bytter koordinatsystem eller krysser av X/Y-boksen
        function forceSync() {
            if (lastModelX !== null && lastModelY !== null) {
                syncMapToTrimbleCamera(lastModelX, lastModelY);
            }
        }

        function addCustomWMS() {
            var url = document.getElementById('wms-url').value;
            var layerName = document.getElementById('wms-layer').value;
            var displayName = layerName || "Egendefinert lag";

            if (!url || !layerName) {
                alert("Fyll inn både WMS URL og lagnavn.");
                return;
            }

            var newWmsLayer = L.tileLayer.wms(url, {
                layers: layerName,
                format: 'image/png',
                transparent: true,
                version: '1.3.0'
            });

            newWmsLayer.addTo(map);
            layerControl.addOverlay(newWmsLayer, displayName);

            document.getElementById('wms-url').value = '';
            document.getElementById('wms-layer').value = '';
        }

        // ==========================================
        // 5. SYNKRONISERING (TRIMBLE TIL KART)
        // ==========================================
        var cameraMarker = L.marker([0,0]).addTo(map);

        function syncMapToTrimbleCamera(modelX, modelY) {
            // Lagre posisjonen for senere bruk
            lastModelX = modelX;
            lastModelY = modelY;

            // Hent verdien fra avhukingsboksen
            const swapXY = document.getElementById('swap-xy').checked;
            
            // Bestem hva som skal mates inn i Proj4 basert på avhukingsboksen
            let projEasting = swapXY ? modelY : modelX;
            let projNorthing = swapXY ? modelX : modelY;

            try {
                // Konvertering
                const wgs84Coords = proj4(currentModelCRS, 'EPSG:4326', [projEasting, projNorthing]);
                const lng = wgs84Coords[0];
                const lat = wgs84Coords[1];

                // Flytt kart og markør
                map.flyTo([lat, lng], 16, { animate: true, duration: 0.5 });
                cameraMarker.setLatLng([lat, lng]);

                document.getElementById('coord-readout').innerHTML = 
                    `<b>Fra 3D:</b> X=${modelX.toFixed(1)}, Y=${modelY.toFixed(1)}<br>` +
                    `<b>Brukt i utregning:</b> Øst=${projEasting.toFixed(1)}, Nord=${projNorthing.toFixed(1)}`;
            } catch (error) {
                console.error("Feil under koordinatkonvertering:", error);
            }
        }

        // Testfunksjon satt opp med koordinater for Fredrikstad-området i NTM Sone 11
        function simulateTrimbleCameraMoved() {
            // Husk å velge "EUREF89 NTM Sone 11" i nedtrekksmenyen før du trykker!
            // Dette er realistiske verdier for Fredrikstad:
            // Nord ≈ 1133000, Øst ≈ 66000
            
            // Hvis modellen din har byttet om aksene, vil X være stor og Y være liten:
            const mockX = 1133500.0; // Feilaktig X (Egentlig Nord)
            const mockY = 66500.0;   // Feilaktig Y (Egentlig Øst)
            
            syncMapToTrimbleCamera(mockX, mockY);
        }
    </script>
</body>
</html>
